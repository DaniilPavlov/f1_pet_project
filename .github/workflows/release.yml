name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_android:
        description: Build Android APK
        type: boolean
        default: true
      build_web:
        description: Build Web
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'push' || inputs.build_android

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.3"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Configure Firebase (secrets or CI stubs)
        env:
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$FIREBASE_OPTIONS_DART" ]; then
            printf '%s\n' "$FIREBASE_OPTIONS_DART" > lib/firebase_options.dart
          else
            echo "FIREBASE_OPTIONS_DART secret missing — using CI stub (Firebase disabled in this APK)."
            cp tool/ci/firebase_options.stub.dart lib/firebase_options.dart
          fi
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s\n' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          else
            echo "GOOGLE_SERVICES_JSON secret missing — using CI stub."
            cp tool/ci/google-services.stub.json android/app/google-services.json
          fi

      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "No Android signing secrets configured. APK will use debug signing."
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF
          # Strip accidental leading spaces from HEREDOC indentation.
          sed -i 's/^[[:space:]]*//' android/key.properties

      - name: Configure MapKit + AppMetrica
        env:
          YANDEX_MAPKIT_API_KEY: ${{ secrets.YANDEX_MAPKIT_API_KEY }}
          APPMETRICA_API_KEY: ${{ secrets.APPMETRICA_API_KEY }}
        run: |
          if [ -z "$YANDEX_MAPKIT_API_KEY" ]; then
            echo "::error::Secret YANDEX_MAPKIT_API_KEY is missing."
            exit 1
          fi
          printf 'yandex.mapkit.apiKey=%s\n' "$YANDEX_MAPKIT_API_KEY" > android/mapkit.properties
          printf 'APPMETRICA_API_KEY=%s\nYANDEX_MAPKIT_API_KEY=%s\n' \
            "${APPMETRICA_API_KEY:-}" "$YANDEX_MAPKIT_API_KEY" > .env
          dart run build_runner build --delete-conflicting-outputs

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses

      - name: Build APK
        env:
          APPMETRICA_API_KEY: ${{ secrets.APPMETRICA_API_KEY }}
        run: |
          if [ -n "$APPMETRICA_API_KEY" ]; then
            flutter build apk --release --dart-define=APPMETRICA_API_KEY="$APPMETRICA_API_KEY"
          else
            echo "::warning::APPMETRICA_API_KEY secret missing — AppMetrica off."
            flutter build apk --release
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error

  build-web:
    name: Web
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' && inputs.build_web

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.3"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Write CI stubs
        run: |
          cp tool/ci/firebase_options.stub.dart lib/firebase_options.dart
          printf 'APPMETRICA_API_KEY=\n' > .env
          dart run build_runner build --delete-conflicting-outputs

      - name: Build Web
        run: flutter build web --release

      - name: Upload Web artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: build/web
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-android
    if: startsWith(github.ref, 'refs/tags/') && needs.build-android.result == 'success'

    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v8
        with:
          name: android-apk
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
