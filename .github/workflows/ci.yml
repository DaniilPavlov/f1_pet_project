name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.3"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Write CI stubs
        run: |
          cp tool/ci/firebase_options.stub.dart lib/firebase_options.dart
          cp tool/ci/google-services.stub.json android/app/google-services.json
          printf 'APPMETRICA_API_KEY=\nYANDEX_MAPKIT_API_KEY=\n' > .env

      - name: Verify codegen is up to date
        run: |
          dart run build_runner build --delete-conflicting-outputs
          if ! git diff --quiet -- . \
            ':!lib/firebase_options.dart' \
            ':!android/app/google-services.json' \
            ':!lib/app_config.g.dart' \
            ':!.env'; then
            echo "::error::Generated files are out of date. Run 'dart run build_runner build' locally and commit the changes."
            git diff --stat -- . \
              ':!lib/firebase_options.dart' \
              ':!android/app/google-services.json' \
              ':!lib/app_config.g.dart' \
              ':!.env'
            exit 1
          fi

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test --coverage

      - name: Upload coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: ignore
