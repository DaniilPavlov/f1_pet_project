name: f1_pet_project
description: F1 App. State Management - MobX. Navigation - Auto Route. API - http://api.jolpi.ca/ergast/f1/. Repository of API - https://github.com/jolpica/jolpica-f1

publish_to: "none"

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.3.0

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.35.3"

dependencies:
  auto_route: ^11.1.0
  collection: any
  colorful_safe_area: ^1.0.0
  dio: ^5.10.0
  flutter:
    sdk: flutter
  flutter_compass: ^0.8.1
  flutter_local_notifications: ^20.1.0
  flutter_localizations:
    sdk: flutter
  flutter_mobx: ^2.3.0
  flutter_timezone: ^5.1.0
  fluttertoast: ^9.0.0
  geolocator: ^14.0.2
  intl: ^0.20.2
  json_annotation: ^4.12.0
  loading_animation_widget: ^1.3.0
  mobx: ^2.5.0
  package_info_plus: ^9.0.1
  permission_handler: ^12.0.3
  provider: ^6.1.5
  responsive_framework: ^1.5.1
  share_plus: ^12.0.2
  shared_preferences: ^2.5.3
  table_calendar: ^3.2.0
  timezone: ^0.10.1
  url_launcher: ^6.3.2
  visibility_detector: ^0.4.0+2
  yandex_mapkit:
    git:
      url: https://github.com/DaniilPavlov/yandex_mapkit.git
      ref: 03e2620f1b7b776f26c3897c657b6243a82096d5

dev_dependencies:
  auto_route_generator: ^10.5.0
  build_runner: ^2.15.1
  flutter_test:
    sdk: flutter
  # flutter_native_splash: ^2.2.17
  # flutter_launcher_icons: ^0.9.2
  json_serializable: ^6.14.0
  meykuless_lint_rules:
    git:
      url: https://github.com/DaniilPavlov/meykuless_lint_rules.git
      ref: 3ba5652f8a54126678b8e96232d1a89f110875e9
  mobx_codegen: ^2.7.7

# flutter_icons:
#   android: "ic_launcher"
#   ios: false
#   image_path: "assets/app_logo.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
    - assets/calendar/
    - assets/nav_bar/
    - assets/icons/
    - assets/circuits/
    - assets/data/

  fonts:
    - family: HelveticaNeueCyr-Bold
      fonts:
        - asset: fonts/HelveticaNeueCyr-Bold.ttf

    - family: Inter-Regular
      fonts:
        - asset: fonts/Inter-Regular.ttf
