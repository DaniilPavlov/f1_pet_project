plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
    id "com.google.firebase.crashlytics"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

// Flutter overwrites local.properties on every build — keep MapKit key elsewhere.
// Priority: process env (CI) → repo-root .env → android/mapkit.properties
def yandexMapKitApiKey = System.getenv('YANDEX_MAPKIT_API_KEY') ?: ''
if (yandexMapKitApiKey.isEmpty()) {
    def dotenvFile = rootProject.file('../.env')
    if (dotenvFile.exists()) {
        dotenvFile.eachLine { line ->
            def trimmed = line.trim()
            if (trimmed.startsWith('YANDEX_MAPKIT_API_KEY=')) {
                yandexMapKitApiKey = trimmed.substring('YANDEX_MAPKIT_API_KEY='.length()).trim()
            }
        }
    }
}
if (yandexMapKitApiKey.isEmpty()) {
    def mapkitProperties = new Properties()
    def mapkitPropertiesFile = rootProject.file('mapkit.properties')
    if (mapkitPropertiesFile.exists()) {
        mapkitPropertiesFile.withReader('UTF-8') { reader ->
            mapkitProperties.load(reader)
        }
        yandexMapKitApiKey = mapkitProperties.getProperty('yandex.mapkit.apiKey') ?: ''
    }
}
if (yandexMapKitApiKey.isEmpty()) {
    println "____NOTE____"
    println "Yandex MapKit API key is missing."
    println "Set YANDEX_MAPKIT_API_KEY in repo-root .env"
    println "____________"
}


boolean hasKeyStore = false
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
    hasKeyStore = true
} else {
    println "____NOTE____"
    println "No keystore defined. The app will not be signed."
    println "Create a android/key.properties file with the following properties:"
    println "storePassword"
    println "keyPassword"
    println "keyAlias"
    println "storeFile"
    println "____________"
}

// CI uses tool/ci/google-services.stub.json — Crashlytics mapping upload would 400 against it.
def googleServicesJson = file('google-services.json')
def isFirebaseCiStub = googleServicesJson.exists() && googleServicesJson.getText('UTF-8').contains('"project_id": "ci-stub"')
if (isFirebaseCiStub) {
    println "Firebase google-services.json is CI stub — Crashlytics mapping upload disabled"
}

android {
    namespace 'com.example.f1_pet_project'
    compileSdk 36

    compileOptions {
        // Flag to enable support for the new language APIs
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    kotlinOptions {
        jvmTarget = '21'
    }

    buildFeatures {
        buildConfig true
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.example.f1_pet_project"
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        minSdkVersion 26
        targetSdk 35
        // Do not set archivesBaseName here — names like "1.6.1(202607230)" break install
        // on some devices ("App not installed"). b2c CI also strips this for the same reason.
        buildConfigField "String", "YANDEX_MAPKIT_API_KEY", "\"${yandexMapKitApiKey}\""
    }

    // Keep default Gradle/Flutter APK names (app-release.apk). Custom outputFileName
    // confuses flutter-apk output and has caused install failures.

    if (hasKeyStore) {
        signingConfigs {
            release {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
                storePassword keystoreProperties['storePassword']
            }
        }
    }
    buildTypes {
        release {
            if (hasKeyStore) {
                signingConfig signingConfigs.release
            } else {
                signingConfig signingConfigs.debug
            }
            firebaseCrashlytics {
                mappingFileUploadEnabled = !isFirebaseCiStub
            }
        }
    }
}

gradle.taskGraph.whenReady { graph ->
    def buildingRelease = graph.allTasks.any { task ->
        def n = task.name.toLowerCase()
        n.contains('release') && (n.contains('assemble') || n.contains('bundle') || n.contains('install'))
    }
    if (buildingRelease && yandexMapKitApiKey.isEmpty()) {
        throw new GradleException(
            "Yandex MapKit API key is empty for release. " +
            "Set YANDEX_MAPKIT_API_KEY (.env locally, or GitHub secret / mapkit.properties in CI)."
        )
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:2.2.0"
    implementation 'com.yandex.android:maps.mobile:4.3.2-full'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.5.1'
    implementation "androidx.legacy:legacy-support-v4:1.0.0"
    implementation "com.google.android.gms:play-services-base:17.5.0"
    implementation "androidx.work:work-runtime:2.8.1"
    implementation "androidx.work:work-runtime-ktx:2.8.1"
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}
